<body class="log-in-page reset-links-page">
    <div class="container">
        <div class="image-section"></div>
        <div class="form-section">
            <div class="form-container"> 
                <form action="#" method="POST"> 
                    <img class="logo" src="./assets/images/logo.png" alt="logo">
                    <h2>Forgot Password?</h2>
                    <p>Enter your registered email. We’ll send you a link to reset your password.</p>
                    <div class="input-groups">
                         <label for="email">Email</label>
                        <div class="input-box">
                            <svg xmlns="http://www.w3.org/2000/svg" width="25" height="26" viewBox="0 0 25 26" fill="none">
                                <path d="M19.7917 4.66669H5.20837C4.37957 4.66669 3.58472 4.99593 2.99867 5.58198C2.41261 6.16803 2.08337 6.96289 2.08337 7.79169V18.2084C2.08337 19.0372 2.41261 19.832 2.99867 20.4181C3.58472 21.0041 4.37957 21.3334 5.20837 21.3334H19.7917C20.6205 21.3334 21.4154 21.0041 22.0014 20.4181C22.5875 19.832 22.9167 19.0372 22.9167 18.2084V7.79169C22.9167 6.96289 22.5875 6.16803 22.0014 5.58198C21.4154 4.99593 20.6205 4.66669 19.7917 4.66669ZM19.7917 6.75002L13.0209 11.4063C12.8625 11.4977 12.6829 11.5458 12.5 11.5458C12.3172 11.5458 12.1376 11.4977 11.9792 11.4063L5.20837 6.75002H19.7917Z" fill="#653CEA"/>
                            </svg>
                            <input type="email" id="email" placeholder="Enter Your Email" required/>
                        </div>
                    </div>  
                </form>
                  <button class="btn" type="submit">Send Reset Link</button>
            </div>
        </div>
    </div>
    <div class="progress-wrap active-progress">
        <svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
            <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98"
                style="transition: stroke-dashoffset 10ms linear; stroke-dasharray: 307.919, 307.919; stroke-dashoffset: 211.945;">
            </path>
        </svg>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
