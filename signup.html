<body class="log-in-page sign-up-page">
  <div class="container">
      <div class="image-section"></div>

      <div class="form-section">
          <div class="form-container">
              <h2>Create Account</h2>
              <p>Sign up to get started</p>

              <form action="#" method="POST">
               
                  <div class="input-group">
                      <label for="fullname">Full Name</label>
                      <input type="text" id="fullname" name="fullname" placeholder="Enter Your Name" required>
                  </div>
 
                  <div class="input-group">
                      <label for="email">Email Address</label>
                      <input type="email" id="email" name="email" placeholder="Enter Your Email" required>
                  </div>
 
                  <div class="input-group">
                      <label for="password">Password</label>
                      <input type="password" id="password" name="password" placeholder="Create a Password" required>
                  </div>
 
                  <div class="input-group">
                      <label for="confirm-password">Confirm Password</label>
                      <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter Password" required>
                  </div>
 
                  <div class="actions">
                      <button class="btn" type="submit">Sign Up</button>
                      <a href="signin.html" class="forgot-password">Already have an account?</a>
                  </div>
              </form>

              <p class="signup-link">By signing up, you agree to our <a href="#">Terms</a> & <a href="#">Privacy Policy</a>.</p>
          </div>
      </div>
  </div>

  <!-- Optional: Keep Progress Circle -->
  <div class="progress-wrap active-progress">
      <svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
          <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98"
              style="transition: stroke-dashoffset 10ms linear; stroke-dasharray: 307.919, 307.919; stroke-dashoffset: 211.945;">
          </path>
      </svg>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/jquery.min.js"></script>
  <script src="assets/js/swiper-bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="assets/js/custom.js"></script>
</body>
